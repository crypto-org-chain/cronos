name: Check Markdown links
on:
  schedule:
    - cron: "0 * * * *"
  pull_request:
  push:
    branches:
      - main
      - release/**
jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            docs/**/*.md
      - uses: gaurav-nelson/github-action-markdown-link-check@0524e79d8d7d1606112722dd7a3b5f5ce367de3e # 1.0.13
        if: steps.changed-files.outputs.any_changed == 'true'
        with:
          folder-path: "docs"
