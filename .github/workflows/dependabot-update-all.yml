name: Dependabot Update All Go Modules
on: pull_request_target

permissions:
  contents: write
  pull-requests: write

env:
  PR_TITLE: ${{ github.event.pull_request.title }}

jobs:
  update-all:
    runs-on: ubuntu-latest
    if: >
      github.actor == 'dependabot[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'dependabot/go_modules/')
    steps:
      - uses: actions/checkout@v7
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25.10"
          check-latest: true
      - name: Update ethermint to latest develop
        run: ./scripts/go-update-ethermint.sh
      - name: Extract updated dependency
        id: deps
        run: |
          set -euo pipefail
          # Parse Dependabot PR titles of the form:
          #   build(deps): bump <module-path> from <x> to <y>
          # Grouped PR titles (e.g. "bump the gomod-minor-patch group across 1 directory")
          # do not match and are handled by falling through to a tidy-only run.
          dep_name=$(grep -oE 'github.com/[^ ]+' <<<"$PR_TITLE" | head -1 || true)
          dep_version=$(grep -oE 'to v?([0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?)' <<<"$PR_TITLE" | awk '{print $2}' || true)

          if [[ -z "$dep_name" || -z "$dep_version" ]]; then
            echo "Grouped or unparseable PR title; skipping single-dep update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            {
              echo "name=$dep_name"
              echo "version=${dep_version#v}"
              echo "skip=false"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Update all Go modules
        if: steps.deps.outputs.skip != 'true'
        run: ./scripts/go-update-dep-all.sh ${{ format('{0}@v{1}', steps.deps.outputs.name, steps.deps.outputs.version) }}
      - name: Tidy all Go modules
        run: ./scripts/go-mod-tidy-all.sh
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          nix_path: nixpkgs=channel:nixos-25.11
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Update gomod2nix.toml
        run: nix develop -c gomod2nix
      - name: Commit changes
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPOSITORY_NAME_WITH_OWNER: ${{ github.event.pull_request.head.repo.full_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execFileSync } = require('node:child_process');
            const fs = require('node:fs');
            const MAX_GITHUB_BLOB_SIZE = 40 * 1024 * 1024;

            const git = (args) => {
              try {
                return execFileSync('git', args, { encoding: 'utf8' });
              } catch (error) {
                throw new Error(`git ${args.join(' ')} failed: ${error.message}`);
              }
            };

            const lines = (args) =>
              git(args)
                .trim()
                .split('\n')
                .filter(Boolean);

            const additions = [...new Set([
              ...lines(['diff', '--name-only', '--diff-filter=ACMRTUX', 'HEAD']),
              ...lines(['ls-files', '--others', '--exclude-standard']),
            ])]
              .sort()
              .map((path) => {
                try {
                  const contents = fs.readFileSync(path);
                  if (contents.length > MAX_GITHUB_BLOB_SIZE) {
                    throw new Error(
                      `${path} is ${contents.length} bytes, which exceeds GitHub's 40 MiB blob limit for API-created commits`,
                    );
                  }
                  return {
                    path,
                    contents: contents.toString('base64'),
                  };
                } catch (error) {
                  throw new Error(`Failed to read ${path}: ${error.message}`);
                }
              });

            const deletions = lines(['diff', '--name-only', '--diff-filter=D', 'HEAD'])
              .sort()
              .map((path) => ({ path }));

            if (!additions.length && !deletions.length) {
              core.info('No changes to commit.');
              return;
            }

            const input = {
              branch: {
                repositoryNameWithOwner: process.env.REPOSITORY_NAME_WITH_OWNER,
                branchName: process.env.BRANCH_NAME,
              },
              message: {
                headline: `${process.env.PR_TITLE} for all modules`,
              },
              expectedHeadOid: lines(['rev-parse', 'HEAD'])[0],
              fileChanges: {},
            };

            if (additions.length) {
              input.fileChanges.additions = additions;
            }
            if (deletions.length) {
              input.fileChanges.deletions = deletions;
            }

            const result = await github.graphql(
              `mutation ($input: CreateCommitOnBranchInput!) {
                createCommitOnBranch(input: $input) {
                  commit {
                    oid
                    url
                  }
                }
              }`,
              { input },
            );

            core.info(`Created commit ${result.createCommitOnBranch.commit.oid}`);
            core.info(result.createCommitOnBranch.commit.url);
