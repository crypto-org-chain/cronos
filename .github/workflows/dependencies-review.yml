name: "Dependency Review"
on:
  pull_request:
    paths:
      - "**/*.go"
      - "**/go.mod"
      - "**/go.sum"
  merge_group:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v7
      - name: "Setup Go"
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"
          check-latest: true
      - name: "Dependency Review"
        uses: actions/dependency-review-action@v5
        with:
          base-ref: ${{ github.event.pull_request.base.sha || 'main' }}
          head-ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fail-on-severity: high
      - name: "Go vulnerability check"
        id: govuln
        run: |
          # Known unfixable vulns can be appended here (space-separated GO-IDs).
          # GO-2025-3443 is a legacy allowlisted entry. Any other GO-ID fails the job.
          ALLOWED="GO-2025-3443"

          if ! make vulncheck 2>&1 | tee govulncheck-output.txt ; then
            echo "govulncheck failed to execute"
            exit 1
          fi

          vulnerabilities=$(grep -oE 'GO-[0-9]{4}-[0-9]+' govulncheck-output.txt | sort -u)
          echo "Detected vulnerabilities: $vulnerabilities"

          for vuln in $vulnerabilities; do
            found=false
            for allow in $ALLOWED; do
              if [ "$vuln" = "$allow" ]; then
                found=true
                break
              fi
            done
            if [ "$found" = false ]; then
              echo "Unallowed vulnerability $vuln found; failing."
              exit 1
            fi
          done

          echo "Only known allowlisted vulnerabilities present. Continuing."
