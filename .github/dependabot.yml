version: 2
updates:
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
    time: "10:00"
  open-pull-requests-limit: 5
  labels:
  - dependencies
  groups:
    gh-actions:
      patterns:
      - "*"
- package-ecosystem: docker
  directory: "/"
  schedule:
    interval: daily
    time: "10:00"
  open-pull-requests-limit: 5
  labels:
  - dependencies
  groups:
    docker:
      patterns:
      - "*"
- package-ecosystem: gomod
  directory: "/"
  schedule:
    interval: daily
    time: "10:00"
  open-pull-requests-limit: 10
  labels:
  - dependencies
  ignore:
  # Tracked via .github/workflows/dependabot-ethermint.yml (pseudo-version on develop).
  - dependency-name: "github.com/evmos/ethermint"
  - dependency-name: "github.com/crypto-org-chain/ethermint"
  groups:
    cosmos-sdk:
      patterns:
      - "cosmossdk.io/*"
      - "github.com/cosmos/*"
    otel:
      patterns:
      - "go.opentelemetry.io/*"
    gomod-minor-patch:
      update-types:
      - minor
      - patch
- package-ecosystem: pip
  directory: "/integration_tests"
  schedule:
    interval: weekly
  open-pull-requests-limit: 5
  labels:
  - dependencies
  groups:
    pip-minor-patch:
      update-types:
      - minor
      - patch
- package-ecosystem: pip
  directory: "/testground/benchmark"
  schedule:
    interval: weekly
  open-pull-requests-limit: 5
  labels:
  - dependencies
  groups:
    pip-minor-patch:
      update-types:
      - minor
      - patch
- package-ecosystem: npm
  directory: "/integration_tests/contracts"
  schedule:
    interval: weekly
  open-pull-requests-limit: 5
  labels:
  - dependencies
  groups:
    npm-minor-patch:
      update-types:
      - minor
      - patch
